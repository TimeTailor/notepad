<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>

  <script>
    const lang = (navigator.language || navigator.userLanguage).toLowerCase();

    let target = "privacy-policy-en.html";

    if (lang.startsWith("ko")) {
      target = "privacy-policy-ko.html";
    } else if (lang.startsWith("ja")) {
      target = "privacy-policy-ja.html";
    } else if (lang.startsWith("zh-tw") || lang.startsWith("zh-hk")) {
      target = "privacy-policy-zh-tw.html";
    } else if (lang.startsWith("zh")) {
      target = "privacy-policy-zh-cn.html";
    } else if (lang.startsWith("es")) {
      target = "privacy-policy-es.html";
    }

    window.location.replace(target);
  </script>

  <noscript>
    <meta http-equiv="refresh" content="0; url=privacy-policy-en.html">
  </noscript>
</head>

<body>
Redirecting...
</body>
</html>
